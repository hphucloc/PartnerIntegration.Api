services:
  api:
    build:
      context: .
      dockerfile: PartnerIntegration.Api/Dockerfile
    depends_on:
      - rabbitmq
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ApiSecurity__ApiKey: x-api-key
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      PartnerVerification__DevelopmentBaseUrl: http://localhost:8080/
      PartnerVerification__BaseUrl: http://localhost:8080/
    ports:
      - "8080:8080"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
